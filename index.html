<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day Planner</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg,#667eea,#764ba2);
      padding:20px;
    }

    .planner{
      width:100%;
      max-width:850px;
      background:white;
      border-radius:20px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    .planner h1{
      text-align:center;
      margin-bottom:25px;
      color:#333;
      font-size:40px;
    }

    .top-section{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:#f4f6ff;
      padding:20px;
      border-radius:15px;
    }

    .card h2{
      margin-bottom:15px;
      color:#444;
      font-size:22px;
    }

    input, textarea{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:white;
      outline:none;
      font-size:15px;
    }

    textarea{
      resize:none;
      height:120px;
    }

    .schedule{
      margin-top:10px;
    }

    .task{
      display:flex;
      align-items:center;
      gap:15px;
      padding:15px;
      background:#f7f7f7;
      border-radius:12px;
      margin-bottom:15px;
    }

    .task input[type="time"]{
      width:120px;
    }

    .task input[type="text"]{
      flex:1;
    }

    .task button{
      background:#ff4d6d;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .task button:hover{
      background:#e63956;
    }

    .add-btn{
      width:100%;
      margin-top:15px;
      padding:15px;
      border:none;
      background:#667eea;
      color:white;
      font-size:18px;
      border-radius:12px;
      cursor:pointer;
      transition:0.3s;
    }

    .add-btn:hover{
      background:#5567d8;
    }

    .footer{
      text-align:center;
      margin-top:25px;
      color:#777;
    }

    @media(max-width:700px){
      .top-section{
        grid-template-columns:1fr;
      }

      .task{
        flex-direction:column;
      }

      .task input[type="time"]{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <div class="planner">

    <h1>🌟 Day Planner</h1>

    <div class="top-section">

      <div class="card">
        <h2>📅 Today's Goals</h2>

        <textarea placeholder="Write your goals here..."></textarea>
      </div>

      <div class="card">
        <h2>📝 Notes</h2>

        <textarea placeholder="Write notes here..."></textarea>
      </div>

    </div>

    <div class="card">

      <h2>⏰ Daily Schedule</h2>

      <div class="schedule" id="schedule">

        <div class="task">
          <input type="time">
          <input type="text" placeholder="Enter task">
          <button onclick="removeTask(this)">Delete</button>
        </div>

      </div>

      <button class="add-btn" onclick="addTask()">
        + Add New Task
      </button>

    </div>

    <div class="footer">
      Stay productive and organized 🚀
    </div>

  </div>

  <script>
    function addTask() {

      const schedule = document.getElementById("schedule");

      const task = document.createElement("div");
      task.classList.add("task");

      task.innerHTML = `
        <input type="time">
        <input type="text" placeholder="Enter task">
        <button onclick="removeTask(this)">Delete</button>
      `;

      schedule.appendChild(task);
    }

    function removeTask(button) {
      button.parentElement.remove();
    }
  </script>

</body>
</html>
